<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eugenio Zarzar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 3rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .dot { color: #6366f1; }
    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #888;
    }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #6366f1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>I work<span class="dot">.</span></h1>
    <p>Building things that matter.</p>
    <span class="badge">Available for opportunities</span>
  </div>
</body>
</html>
